// Builds the full task form inside the modal.
// ============================================================

// Color presets for the group color picker
const PRESET_COLORS = [
    '#7c6eff','#3ecf8e','#f5a623','#f05252','#38bdf8',
    '#e879f9','#fb923c','#a3e635','#f472b6','#94a3b8',
    '#fbbf24','#34d399','#60a5fa','#c084fc','#fb7185',
];

// Tracks the currently selected color in the group creation form
let pickerSelectedColor = PRESET_COLORS[0];

// Build and open the "Add Task" modal.
// Optionally pre-fill date and hour (when clicked from the calendar grid).
// `date` is a local Date object; `hour` is a 0-23 integer.
function openAddTaskModal(date, hour) {
    // Build the default scheduled start/end if we know the date/hour.
    // We format datetime-local strings manually using local time components
    // so we don't get UTC-offset issues from .toISOString().
    let defaultStart = '', defaultEnd = '';
    if (date && hour !== undefined) {
        // Build "YYYY-MM-DDTHH:MM" using local time components
        const pad = n => String(n).padStart(2, '0');
        const dateStr = toDateStr(date); // local YYYY-MM-DD
        defaultStart    = `${dateStr}T${pad(hour)}:00`;
        defaultEnd        = `${dateStr}T${pad(hour + 1 < 24 ? hour + 1 : 23)}:59`;
    }

    openModal('Add Task', buildTaskFormHTML(null, defaultStart, defaultEnd), () => {
        const task = readTaskForm();
        if (!task) return; // validation failed
        task.id = makeId();
        task.createdAt = new Date().toISOString();
        task.status = 'pending';
        task.completedAt = null;
        appData.tasks.push(task);
        markUnsaved();
        renderCalendar();
        renderSidebar();
        closeModal();
        // Trigger auto-reflow immediately so the new task gets slotted in
        if (appData.settings.autoReflow) runAutoReflow();
    });

    // Wire up interactive form elements after the modal opens
    setupTaskFormInteractions();
}

// Open the edit modal for an existing task
function openEditTaskModal(taskId) {
    const task = appData.tasks.find(t => t.id === taskId);
    if (!task) return;

    openModal('Edit Task', buildTaskFormHTML(task), () => {
        const updated = readTaskForm();
        if (!updated) return;
        // Overwrite the task fields with the updated values, keeping id/createdAt/status
        Object.assign(task, updated);
        markUnsaved();
        renderCalendar();
        renderSidebar();
        closeModal();
    });

    // Add a delete button to the footer for edit mode
    const footer = document.getElementById('modal-footer');
    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-danger';
    delBtn.textContent = 'Delete Task';
    delBtn.style.marginRight = 'auto';
    delBtn.addEventListener('click', () => {
        if (confirm(`Delete "${task.name}"? This cannot be undone.`)) {
            appData.tasks = appData.tasks.filter(t => t.id !== taskId);
            markUnsaved();
            renderCalendar();
            renderSidebar();
            closeModal();
        }
    });
    footer.insertBefore(delBtn, footer.firstChild);

    setupTaskFormInteractions(task);
}

    `;
}

// Build the HTML for a single recurrence rule row
// rule = existing rule object (or null for a new empty row)
function buildRuleRowHTML(rule, index) {
    const r = rule || { type: 'everyNDays', value: 1 };

    return `
        <div class="recurrence-rule-row" data-rule-index="${index}">
            <select class="rule-type-select">
                <option value="once"                 ${r.type === 'once'                 ? 'selected' : ''}>One-time (no repeat)</option>
                <option value="everyNSec"        ${r.type === 'everyNSec'        ? 'selected' : ''}>Every N seconds</option>
                <option value="everyNMin"        ${r.type === 'everyNMin'        ? 'selected' : ''}>Every N minutes</option>
                <option value="everyNHour"     ${r.type === 'everyNHour'     ? 'selected' : ''}>Every N hours</option>
                <option value="everyNDays"     ${r.type === 'everyNDays'     ? 'selected' : ''}>Every N days</option>
                <option value="everyNWeeks"    ${r.type === 'everyNWeeks'    ? 'selected' : ''}>Every N weeks</option>
                <option value="everyNMonths" ${r.type === 'everyNMonths' ? 'selected' : ''}>Every N months</option>
                <option value="weekdays"         ${r.type === 'weekdays'         ? 'selected' : ''}>Specific weekdays</option>
                <option value="xTimes"             ${r.type === 'xTimes'             ? 'selected' : ''}>Repeat X times total</option>
                <option value="untilDate"        ${r.type === 'untilDate'        ? 'selected' : ''}>Repeat until date</option>
            </select>

// Convert a datetime-local string (e.g. "2026-05-18T14:00") to a proper UTC ISO string
// WITHOUT any timezone shift. The datetime-local input always gives local time, but
// `new Date("2026-05-18T14:00")` interprets it as UTC — causing a shift equal to the
// user's timezone offset. This function constructs a Date using the local year/month/day/
// hour/minute values directly, so the resulting ISO string reflects the correct moment.
function localDatetimeToISO(datetimeLocalStr) {
    // Split on "T" to get the date part and time part separately
    const [datePart, timePart] = datetimeLocalStr.split('T');
    const [year, month, day]     = datePart.split('-').map(Number);
    const [hour, minute]             = timePart.split(':').map(Number);

    // new Date(year, monthIndex, day, hour, minute) uses LOCAL time — no UTC shift
    return new Date(year, month - 1, day, hour, minute).toISOString();
}

// Read all form values and return a task object (or null if invalid)
function readTaskForm() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) {
        alert('Please enter a task name.');
        return null;
    }

    let groupId = document.getElementById('f-group').value;
    // If the user left it on "create new group" without saving, use first group
    if (groupId === '__new__') groupId = appData.groups[0]?.id || '';

    const priority    = parseFloat(document.getElementById('f-priority').value) || 1;
    const isFixed     = document.getElementById('f-fixed').checked;
    const isChunkable = document.getElementById('f-chunkable').checked;
    const minMinutes    = parseInt(document.getElementById('f-min').value) || 15;
    const expectedMinutes = parseInt(document.getElementById('f-expected').value) || 60;
    const maxMinutes    = parseInt(document.getElementById('f-max').value) || 120;
    const softDeadline = document.getElementById('f-soft').value || null;
    const hardDeadline = document.getElementById('f-hard').value || null;
    const notes = document.getElementById('f-notes').value.trim();

    // Scheduled block (manual)
    const startVal = document.getElementById('f-start').value;
    const endVal     = document.getElementById('f-end').value;

    // IMPORTANT: datetime-local inputs give us a string like "2026-05-18T14:00".
    // Passing that directly to `new Date()` makes the JS engine treat it as UTC,
    // which then shifts the time by the local timezone offset when converted back
    // via toISOString(). We use localDatetimeToISO() instead, which interprets
    // the string as local time and produces a correct UTC ISO string.
    const scheduledBlocks = (startVal && endVal)
        ? [{ startISO: localDatetimeToISO(startVal), endISO: localDatetimeToISO(endVal) }]
        : [];

    // Recurrence rules
    const recurrenceMode = document.querySelector('#recurrence-mode-toggle button.active')?.dataset.mode || 'OR';
    const ruleRows = document.querySelectorAll('.recurrence-rule-row');
    const rules = [];

    ruleRows.forEach(row => {
        const type = row.querySelector('.rule-type-select').value;
        const rule = { type };

        if (!['once','weekdays','untilDate'].includes(type)) {
            rule.value = parseInt(row.querySelector('.rule-value-input').value) || 1;
        }
        if (type === 'weekdays') {
            rule.weekdays = [...row.querySelectorAll('.rule-weekday-check:checked')]
                .map(cb => parseInt(cb.value));
        }
        if (type === 'untilDate') {
            rule.untilDate = row.querySelector('.rule-date-input').value;
        }

        rules.push(rule);
    });

    return {
        name, groupId, priority, isFixed, isChunkable,
        minMinutes, expectedMinutes, maxMinutes,
        softDeadline: softDeadline ? localDatetimeToISO(softDeadline) : null,
        hardDeadline: hardDeadline ? localDatetimeToISO(hardDeadline) : null,
        notes, scheduledBlocks,
        recurrence: { rules, mode: recurrenceMode },
    };
}

// ============================================================
// SECTION 10: AUTO-SCHEDULING ALGORITHM
// Places non-fixed tasks into open time slots on the calendar.
// ============================================================

// Entry point: run the scheduler.
// If a Set of taskIds is passed, only schedule those tasks.
// If null/undefined is passed, schedule ALL eligible tasks.
// "Eligible" means: not fixed, not done.
function runAutoSchedule(taskIdSet) {

    // Decide which tasks to operate on:
    // - If taskIdSet is a non-empty Set, only those tasks
    // - Otherwise, all non-fixed, non-done tasks
    const useAll = !taskIdSet || taskIdSet.size === 0;

    const movableTasks = appData.tasks
        .filter(t => {
            if (t.isFixed || t.status === 'done') return false;
            return useAll ? true : taskIdSet.has(t.id);
        })
        .sort((a, b) => {
            // Sort order:
            // 1. Hard deadline first (most urgent deadlines get scheduled first)
            // 2. Then soft deadline
            // 3. Then priority (higher = more urgent)
            const scoreA = computeUrgencyScore(a);
            const scoreB = computeUrgencyScore(b);
            return scoreB - scoreA; // higher score = more urgent = scheduled first
        });

    // Collect all fixed event blocks so we can avoid overlapping them
    const fixedBlocks = [];
    appData.tasks.forEach(task => {
        if (task.isFixed && task.scheduledBlocks) {
            task.scheduledBlocks.forEach(b => fixedBlocks.push({
                start: new Date(b.startISO),
                end:     new Date(b.endISO),
            }));
        }
    });

    // Schedule each movable task
    const now = new Date();
    const scheduleHorizon = new Date(now); // we'll schedule up to 30 days out
    scheduleHorizon.setDate(scheduleHorizon.getDate() + 30);

    // Track all placed blocks (both fixed and newly placed) to avoid overlaps
    const placedBlocks = [...fixedBlocks];

    const impossibleTasks = []; // tasks we couldn't fit before their hard deadline

    movableTasks.forEach(task => {
        // Clear previous scheduled blocks for this task (we're rescheduling it)
        task.scheduledBlocks = [];

        const targetMinutes = task.expectedMinutes || 60;
        const minMinutes        = task.minMinutes || 15;

        // Hard deadline is the upper bound for placement
        const deadline = task.hardDeadline
            ? new Date(task.hardDeadline)
            : scheduleHorizon;

        if (task.isChunkable) {
            // Chunkable tasks: place in chunks as they fit
            let remainingMinutes = targetMinutes;
            let searchFrom = new Date(now);

            while (remainingMinutes > 0 && searchFrom < deadline) {
                const slot = findNextFreeSlot(searchFrom, deadline, minMinutes, placedBlocks);
                if (!slot) break; // no more free slots before deadline

                // Use as many minutes as possible from this slot, up to what's remaining
                const slotDurationMinutes = (slot.end - slot.start) / 60000;
                const useMinutes = Math.min(remainingMinutes, slotDurationMinutes);

                const chunkStart = slot.start;
                const chunkEnd     = new Date(chunkStart.getTime() + useMinutes * 60000);

                task.scheduledBlocks.push({
                    startISO: chunkStart.toISOString(),
                    endISO:     chunkEnd.toISOString(),
                });

                // Mark this chunk as occupied
                placedBlocks.push({ start: chunkStart, end: chunkEnd });

                remainingMinutes -= useMinutes;
                searchFrom = new Date(chunkEnd);
            }

            if (remainingMinutes > 0) {
                impossibleTasks.push(task);
            }

        } else {
            // Non-chunkable task: needs a single contiguous slot
            const slot = findNextFreeSlot(now, deadline, targetMinutes, placedBlocks);

            if (slot) {
                const end = new Date(slot.start.getTime() + targetMinutes * 60000);
                task.scheduledBlocks.push({
                    startISO: slot.start.toISOString(),
                    endISO:     end.toISOString(),
                });
                placedBlocks.push({ start: slot.start, end });
            } else {
                // Try again with minimum time
                const minSlot = findNextFreeSlot(now, deadline, minMinutes, placedBlocks);
                if (minSlot) {
                    const end = new Date(minSlot.start.getTime() + minMinutes * 60000);
                    task.scheduledBlocks.push({
                        startISO: minSlot.start.toISOString(),
                        endISO:     end.toISOString(),
                    });
                    placedBlocks.push({ start: minSlot.start, end });
                } else {
                    impossibleTasks.push(task);
                }
            }
        }
    });

    // If some tasks couldn't be scheduled, warn the user
    if (impossibleTasks.length > 0) {
        const names = impossibleTasks.map(t => `"${t.name}"`).join(', ');
        showBlockingFixedEventSuggestion(impossibleTasks, fixedBlocks);
    }

    markUnsaved();
    renderCalendar();
    renderSidebar();
}

// Compute a numeric urgency score for sorting tasks before scheduling.
// Higher score = more urgent = scheduled first.
function computeUrgencyScore(task) {
    const now = new Date();
    let score = task.priority || 1;

    // Add urgency based on how soon the hard deadline is
    if (task.hardDeadline) {
        const hoursUntil = (new Date(task.hardDeadline) - now) / 3600000;
        // The closer the deadline, the more we add to the score
        // (1000 / hours means a deadline 1 hour away adds 1000 points)
        score += Math.max(0, 1000 / Math.max(hoursUntil, 0.1));
    }

    // Soft deadline adds some urgency but less than hard
    if (task.softDeadline) {
        const hoursUntil = (new Date(task.softDeadline) - now) / 3600000;
        score += Math.max(0, 100 / Math.max(hoursUntil, 0.1));
    }

    return score;
}

// Find the next free time slot of at least `durationMinutes` between `searchFrom` and `deadline`.
// `placedBlocks` is an array of { start, end } Date pairs that are already occupied.
// Returns { start, end } as Date objects, or null if no slot is found.
function findNextFreeSlot(searchFrom, deadline, durationMinutes, placedBlocks) {
    // Search in 15-minute increments
    const stepMs = 15 * 60 * 1000;
    const durationMs = durationMinutes * 60 * 1000;

    let cursor = new Date(searchFrom);

    while (cursor < deadline) {
        const candidateEnd = new Date(cursor.getTime() + durationMs);

        // Check if this candidate window overlaps any occupied block
        const isBlocked = placedBlocks.some(b =>
            cursor < b.end && candidateEnd > b.start
        );

        if (!isBlocked && candidateEnd <= deadline) {
            return { start: new Date(cursor), end: candidateEnd };
        }

        // Move the cursor forward by one step
        cursor = new Date(cursor.getTime() + stepMs);
    }

    return null; // no free slot found
}

// Show a dialog suggesting which fixed events to move or delete to make scheduling possible
function showBlockingFixedEventSuggestion(impossibleTasks, fixedBlocks) {
    const taskNames = impossibleTasks.map(t => t.name).join(', ');

    // Find fixed events that might be blocking — those that overlap the deadline windows
    const blockingFixed = appData.tasks.filter(t =>
        t.isFixed && t.scheduledBlocks && t.scheduledBlocks.some(b => {
            const bStart = new Date(b.startISO);
            const bEnd     = new Date(b.endISO);
            // Check if any impossible task's deadline window overlaps this block
            return impossibleTasks.some(imp => {
                const from = new Date();
                const to     = imp.hardDeadline ? new Date(imp.hardDeadline) : new Date(Date.now() + 30*24*3600000);
                return bStart < to && bEnd > from;
            });
        })
    );

    let suggestion = `⚠️ Could not fully schedule: ${taskNames}.\n\n`;

    if (blockingFixed.length > 0) {
        suggestion += `These fixed events may be taking up the needed time slots. Consider moving or removing:\n`;
        blockingFixed.forEach(f => {
            suggestion += `• "${f.name}"\n`;
        });
    } else {
        suggestion += `There simply may not be enough free time before the deadlines.`;
    }

    // Show as a notification banner as well
    showNotification(suggestion.split('\n')[0], 'warn');

    // Also alert so the user can see the full suggestion
    alert(suggestion);
}

// ============================================================
// SECTION 11: AUTO-REFLOW
// Called automatically when tasks are added, completed, or overrun.
// ============================================================

function runAutoReflow() {
    if (!appData.settings.autoReflow) return;

    // Check for any in-progress tasks that have run past their end time
    const now = new Date();
    let anyOverrun = false;

    appData.tasks.forEach(task => {
        if (task.status === 'done' || task.isFixed) return;
        if (!task.scheduledBlocks || task.scheduledBlocks.length === 0) return;

        const lastBlock = task.scheduledBlocks[task.scheduledBlocks.length - 1];
        const blockEnd = new Date(lastBlock.endISO);

        if (now > blockEnd && task.status !== 'done') {
            // This task has overrun — extend it and flag it
            task.status = 'in-progress';
            // Extend the last block to now + expected remaining time
            const extendedEnd = new Date(now.getTime() + (task.expectedMinutes || 30) * 60000);
            lastBlock.endISO = extendedEnd.toISOString();
            anyOverrun = true;
        }
    });

    if (anyOverrun) {
        showNotification('⚠️ Some tasks have overrun. Rescheduling remaining tasks...', 'warn');
        // Re-run the scheduler to re-pack everything that's been displaced
        runAutoSchedule();
    }
}

function showNotification(text, type) {
    if (!appData.settings.notifyInApp) return;

    const banner = document.getElementById('notification-banner');
    const textEl = document.getElementById('notification-text');
    if (!banner || !textEl) return;

    textEl.textContent = text;
    banner.style.background = type === 'warn' ? 'var(--warn)' : 'var(--danger)';
    banner.classList.add('show');
}

function dismissNotification() {
    const banner = document.getElementById('notification-banner');
    if (banner) banner.classList.remove('show');
}

// Check for upcoming deadlines and notify the user
function checkDeadlines() {
    const now = new Date();
    // Warn if a hard deadline is within 1 hour
    const warnWindowMs = 60 * 60 * 1000;

    appData.tasks.forEach(task => {
        if (task.status === 'done') return;

        if (task.hardDeadline) {
            const dl = new Date(task.hardDeadline);
            const timeLeft = dl - now;
            if (timeLeft > 0 && timeLeft < warnWindowMs) {
                showNotification(
                    `⚠️ "${task.name}" has a hard deadline in ${Math.round(timeLeft/60000)} minutes!`,
                    'danger'
                );
            }
        }
    });
}

    // Wire up settings-specific interactions after modal renders

    // Toggle email address field visibility
    const emailToggle = document.getElementById('s-notify-email');
    const emailRow        = document.getElementById('email-row');
    if (emailToggle && emailRow) {
        emailToggle.addEventListener('change', () => {
            emailRow.style.display = emailToggle.checked ? 'flex' : 'none';
        });
    }

    // Export button
    document.getElementById('s-export')?.addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `flux-planner-${todayISO()}.json`;
        a.click();
        URL.revokeObjectURL(url);
    });

    // Import button (triggers hidden file input)
    document.getElementById('s-import')?.addEventListener('click', () => {
        document.getElementById('s-import-file')?.click();
    });

    document.getElementById('s-import-file')?.addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const imported = JSON.parse(ev.target.result);
                appData = { ...appData, ...imported };
                appData.settings = { ...appData.settings, ...(imported.settings || {}) };
                saveToLocal();
                applyTheme(appData.settings.theme || 'dark');
                renderCalendar();
                renderSidebar();
                closeModal();
                alert('Import successful!');
            } catch (err) {
                alert('Failed to import: invalid JSON file.');
            }
        };
        reader.readAsText(file);
    });

    // Delete group buttons
    document.querySelectorAll('.btn-delete-group').forEach(btn => {
        btn.addEventListener('click', () => {
            const row = btn.closest('.group-list-item');
            const gid = row.dataset.groupId;
            if (appData.groups.length <= 1) { alert('You must have at least one group.'); return; }
            if (!confirm('Delete this group? Tasks in this group will be unassigned.')) return;
            appData.groups = appData.groups.filter(g => g.id !== gid);
            row.remove();
        });
    });
}

// ============================================================
// SECTION 14: COLOR UTILITIES
// ============================================================

// Convert HSL values (0-360, 0-100, 0-100) to a hex color string
function hslToHex(h, s, l) {
    s /= 100;
    l /= 100;

    // Formula from CSS Color Level 4 spec
    const k = n => (n + h / 30) % 12;
    const a = s * Math.min(l, 1 - l);
    const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));

    // Convert each channel from 0-1 to 0-255 and then to hex
    const toHex = x => Math.round(x * 255).toString(16).padStart(2, '0');
    return `#${toHex(f(0))}${toHex(f(8))}${toHex(f(4))}`;
}

// Sync the HSL sliders to match a given hex color
// (used when a preset swatch is clicked)
function syncSlidersToHex(hex) {
    const h = hex.replace('#', '');
    const r = parseInt(h.substring(0,2),16)/255;
    const g = parseInt(h.substring(2,4),16)/255;
    const b = parseInt(h.substring(4,6),16)/255;

    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    let hue = 0, sat = 0;
    const lit = (max + min) / 2;

    if (max !== min) {
        const d = max - min;
        sat = lit > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
            case r: hue = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
            case g: hue = ((b - r) / d + 2) / 6; break;
            case b: hue = ((r - g) / d + 4) / 6; break;
        }
    }

    const hEl = document.getElementById('hue-slider');
    const sEl = document.getElementById('sat-slider');
    const lEl = document.getElementById('lit-slider');
    if (hEl) hEl.value = Math.round(hue * 360);
    if (sEl) sEl.value = Math.round(sat * 100);
    if (lEl) lEl.value = Math.round(lit * 100);
}

// ============================================================
// SECTION 15: EVENT LISTENERS & INITIALIZATION
// Wire up all the buttons and start the app.
// ============================================================

function init() {

    // ---- Load saved data ----
    loadFromLocal(); // always load from localStorage first (fast, offline-safe)
    applyTheme(appData.settings.theme || 'auto');

    // If the system prefers light mode and no preference is saved yet, use light
    if (!localStorage.getItem(LOCAL_STORAGE_KEY)) {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyTheme(prefersDark ? 'dark' : 'light');
    }

    // Try to load from JSONbin (async, may update the UI after a moment)
    loadFromJSONbin().then(() => {
        renderCalendar();
        renderSidebar();
    });

    // ---- Wire up view tab buttons ----
    document.querySelectorAll('#view-tabs button').forEach(btn => {
        btn.addEventListener('click', () => {
            appData.currentView = btn.dataset.view;
            updateViewTabs();
            renderCalendar();
            updateDateLabel();
            markUnsaved();
        });
    });

    // ---- Navigation buttons ----
    document.getElementById('btn-prev').addEventListener('click', () => {
        appData.currentDateISO = stepDate(appData.currentDateISO, appData.currentView, -1);
        setCurrentDate(appData.currentDateISO);
    });

    document.getElementById('btn-next').addEventListener('click', () => {
        appData.currentDateISO = stepDate(appData.currentDateISO, appData.currentView, +1);
        setCurrentDate(appData.currentDateISO);
    });

    document.getElementById('btn-today').addEventListener('click', () => {
        appData.currentDateISO = todayISO();
        setCurrentDate(appData.currentDateISO);
    });

    // ---- Theme toggle ----
    document.getElementById('btn-theme').addEventListener('click', toggleTheme);

    // ---- Sidebar toggle ----
    document.getElementById('btn-sidebar-toggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('collapsed');
    });

    // ---- Add Task button ----
    document.getElementById('btn-add-task').addEventListener('click', () => openAddTaskModal());

    // ---- Settings button ----
    document.getElementById('btn-settings').addEventListener('click', openSettingsModal);

    // ---- Auto-schedule button in the nav ----
    // Runs the scheduler immediately on whatever is currently selected.
    // If nothing is selected, it schedules all eligible tasks (same as before).
    document.getElementById('btn-auto-schedule').addEventListener('click', () => {
        runAutoSchedule(selectedTaskIds);
    });

    // ---- Bulk toolbar buttons ----

    // Clear selection (the ✕ button)
    document.getElementById('btn-clear-selection').addEventListener('click', () => {
        clearSelection();
    });

    // Auto-schedule only the selected tasks
    document.getElementById('btn-schedule-selected').addEventListener('click', () => {
        runAutoSchedule(selectedTaskIds);
        clearSelection();
    });

    // Mark all selected tasks as done
    document.getElementById('btn-bulk-done').addEventListener('click', () => {
        markSelectedDone();
    });

    // Mark all selected tasks as pending
    document.getElementById('btn-bulk-pending').addEventListener('click', () => {
        markSelectedPending();
    });

    // Change the group of all selected tasks when the dropdown changes
    document.getElementById('bulk-group-select').addEventListener('change', e => {
        changeSelectedGroup(e.target.value);
        // Reset the dropdown back to the placeholder after applying the change
        e.target.value = '';
    });

    // Delete all selected tasks
    document.getElementById('btn-bulk-delete').addEventListener('click', () => {
        deleteSelectedTasks();
    });

    // ---- Ctrl+A (or Cmd+A on Mac) to select all eligible tasks ----
    // We call preventDefault() to stop the browser from selecting all text on the page.
    document.addEventListener('keydown', e => {
        // If the user is currently typing in a text field, textarea, or any other
        // editable element, let the browser handle the keypress normally.
        // e.target is the element that received the keypress.
        const activeTag = document.activeElement.tagName;
        const isTyping = activeTag === 'INPUT'
                      || activeTag === 'TEXTAREA'
                      || activeTag === 'SELECT'
                      || document.activeElement.isContentEditable;

        if (isTyping) return; // hands off — let the browser do its thing

        if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
            e.preventDefault();
            selectAllTasks();
        }
        // Press Escape to clear the selection
        if (e.key === 'Escape') {
            clearSelection();
        }
    });
    //Select all btn
    document.getElementById('btn-select-all').addEventListener('click', () => {
        selectAllTasks();
    });

    // ---- Manual save button (the status pill) ----
    document.getElementById('save-status').addEventListener('click', () => {
        saveToJSONbin();
    });

    // ---- Modal close button (the X in the header) ----
    // Note: the Cancel and Save buttons in the footer are re-created fresh by
    // openModal() each time, so their listeners are attached there, not here.
    document.getElementById('modal-close').addEventListener('click', closeModal);

    // Close modal when clicking the dark overlay (outside the modal box)
    document.getElementById('modal-overlay').addEventListener('click', e => {
        if (e.target === document.getElementById('modal-overlay')) closeModal();
    });

    // ---- Sidebar filter tabs ----
    document.querySelectorAll('#sidebar-filters button').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#sidebar-filters button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentSidebarFilter = btn.dataset.filter;
            renderSidebar();
        });
    });

    // ---- Auto-save timer ----
    startAutoSave();

    // ---- Deadline checker (runs every 5 minutes) ----
    setInterval(checkDeadlines, 5 * 60 * 1000);
    checkDeadlines(); // also check immediately on load

    // NOTE: Auto-reflow is NOT on a timer anymore (it was too slow and unexpected).
    // It now fires only when tasks are explicitly mutated (added, edited, completed, deleted).
    // See the autoReflow toggle in Settings to enable/disable it.

    // ---- Initial render ----
    updateViewTabs();
    updateDateLabel();
    renderCalendar();
    renderSidebar();

    // Set the save status indicator
    setSaveStatus(appData.settings.jsonbinApiKey ? 'saved' : 'offline');
}

// Mark the correct view tab as active
function updateViewTabs() {
    document.querySelectorAll('#view-tabs button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === appData.currentView);
    });
}

// Start everything when the page finishes loading
document.addEventListener('DOMContentLoaded', init);

</script>
</body>
